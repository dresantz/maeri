<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a12">
  
  <title>Construtor - Maeri RPG</title>

  <!-- Manifest do PWA -->
  <link rel="manifest" href="../manifest.json">

  <!-- Ícones -->
  <link rel="icon" href="../favicon.ico" sizes="32x32">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

  <!-- Meta tags para iOS (tela cheia) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maeri RPG">

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/floatingButtons.css" />
  <link rel="stylesheet" href="../css/dice.css" />
  <link rel="stylesheet" href="../css/sheet.css" />
  <link rel="stylesheet" href="../css/spells.css" />
  <link rel="stylesheet" href="../css/3d-dice.css" />
  
  <!-- Estilos da Área do Jogador -->
  <link rel="stylesheet" href="../css/builder/player-tabs.css" />
  <link rel="stylesheet" href="../css/builder/char-cards.css" />
  <link rel="stylesheet" href="../css/builder/builder-base.css" />
  <link rel="stylesheet" href="../css/builder/char-list.css" />
  
  <link rel="stylesheet" href="../css/builder/e1-mentalidade.css" />
  <link rel="stylesheet" href="../css/builder/e2-complementos.css" />
  <link rel="stylesheet" href="../css/builder/e3-narrativa.css" />
  <link rel="stylesheet" href="../css/builder/e4-inventario.css" />
  <link rel="stylesheet" href="../css/builder/level-up.css" />
</head>

<body>
  <header class="app-header">
    <h1>Área do Jogador</h1>
    <p class="subtitle">Forjando Heróis</p>
  </header>

  <main class="player-main">
    <!-- Abas de navegação -->
    <div class="player-tabs" role="tablist">
      <button class="tab-button active" id="tab-builder" role="tab" aria-selected="true" aria-controls="builder-panel">
        Construtor
      </button>
      <button class="tab-button" id="tab-chars" role="tab" aria-selected="false" aria-controls="chars-panel">
        Personagens
      </button>
    </div>

    <!-- Painel Construtor -->
    <section id="builder-panel" class="tab-panel active" role="tabpanel" aria-labelledby="tab-builder">
      <div class="builder-grid">
        <h2 class="builder-title">Construção de Personagem</h2>
        <p class="builder-subtitle">Siga as etapas para criar seu herói</p>
        
        <div class="builder-steps">
          <button class="builder-step" data-step="1">
            <span class="step-number">1</span>
            <span class="step-title">Mentalidade</span>
            <span class="step-desc">Escolha sua essência</span>
          </button>
          
          <button class="builder-step" data-step="2">
            <span class="step-number">2</span>
            <span class="step-title">Complementos</span>
            <span class="step-desc">Aprimore suas habilidades</span>
          </button>
          
          <button class="builder-step" data-step="3">
            <span class="step-number">3</span>
            <span class="step-title">Narrativa</span>
            <span class="step-desc">Forje sua história</span>
          </button>
          
          <button class="builder-step" data-step="4">
            <span class="step-number">4</span>
            <span class="step-title">Inventário</span>
            <span class="step-desc">Equipe seu herói</span>
          </button>

          <button class="builder-step builder-step--levelup" data-step="levelup">
            <span class="step-number">⬆</span>
            <span class="step-title">Level Up</span>
            <span class="step-desc">Evolua seu herói</span>
          </button>

        </div>

        <!-- Área de preview do construtor -->
        <div class="builder-preview">
          <p class="preview-placeholder">Selecione uma etapa para começar</p>
        </div>
      </div>
    </section>

    <!-- Painel Personagens -->
    <section id="chars-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-chars">
      <div class="chars-container">
        <!-- Personagens Salvos (máx 3) -->
        <div class="chars-saved-section">
          <h3 class="chars-section-title">
            <span class="title-icon">⚔️</span>
            Seus Personagens
            <span class="chars-counter">0/3</span>
          </h3>
          
          <div class="chars-grid saved-chars">
            <!-- Cards de personagens salvos (vazios inicialmente) -->
            <div class="char-card char-card--empty">
              <div class="char-card-content">
                <span class="char-plus">+</span>
                <span class="char-label">Novo Personagem</span>
              </div>
            </div>
            
            <div class="char-card char-card--empty">
              <div class="char-card-content">
                <span class="char-plus">+</span>
                <span class="char-label">Novo Personagem</span>
              </div>
            </div>
            
            <div class="char-card char-card--empty">
              <div class="char-card-content">
                <span class="char-plus">+</span>
                <span class="char-label">Novo Personagem</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Área de Personagens Prontos - Apenas o container -->
        <div class="chars-ready-section">
          <h3 class="chars-section-title">
            <span class="title-icon">📜</span>
            Personagens Prontos
          </h3>
          
          <!-- O grid vazio será preenchido pelo JavaScript -->
          <div class="chars-grid ready-chars">
            <!-- Cards serão inseridos aqui dinamicamente -->
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- Botões flutuantes -->
  <aside class="floating-actions" aria-label="Quick actions">
    <button id="sheet-button" class="floating-button floating-button--pill floating-button--primary" aria-label="Open Character Sheet">
      <span class="floating-label">Ficha</span>
    </button>
    <button id="spells-button" class="floating-button floating-button--pill floating-button--secondary" aria-label="Open Spells">
      <span class="floating-label">Magias</span>
    </button>
    <button id="dice-toggle" class="floating-button floating-button--pill" aria-label="Open Dice Roller" aria-expanded="false">
      <span class="floating-label">Dados</span>
    </button>
    <a href="../index.html" class="floating-button" id="back-to-home">
      <span class="floating-icon">⌂</span>
    </a>
  </aside>

  <div id="modal-root"></div>
  
  <script type="module">
    // 1. Carrega modais globais primeiro
    import { loadGlobalModals } from '../js/modalLoader.js';
    
    // 2. Inicializa após modais carregados
    document.addEventListener('modals:loaded', () => {
      import('../js/sheet.js');
      import('../js/spells.js');
      import('../js/dice.js');
    });
    
    // 3. Carrega modais
    loadGlobalModals();
  </script>

  <!-- PlayerAreaManager separado para clareza -->
  <script type="module">
    import PlayerAreaManager from '../js/builder/builder.js';
    
    const initPlayerManager = () => {
      window.playerManager = new PlayerAreaManager();
    };
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPlayerManager);
    } else {
      initPlayerManager();
    }
  </script>

  <!-- Registrar Service Worker para PWA -->
  <script src="../js/pwa-update.js"></script>

</body>
</html>
